version: "3.9"

services:

  backend:
    build: .
    container_name: fuhrer_backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - redis

  redis:
    image: redis:7-alpine

    container_name: fuhrer_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    command:
      - redis-server
      - --appendonly
      - yes
